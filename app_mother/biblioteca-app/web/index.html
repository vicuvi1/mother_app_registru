<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registru Digital — versiune web</title>
  <style>
    :root { --bg:#f4f6fb; --panel:#fff; --line:#d7deea; --accent:#2563eb;
            --accent-d:#1d4ed8; --text:#1e293b; --muted:#64748b; --sidebar:#0f172a; }
    * { box-sizing: border-box; }
    body { margin:0; font:14px/1.4 "Segoe UI",system-ui,sans-serif; background:var(--bg); color:var(--text); }
    button { background:var(--accent); color:#fff; border:0; border-radius:6px; padding:7px 12px;
             cursor:pointer; font-size:13px; }
    button:hover { background:var(--accent-d); }
    button.ghost { background:transparent; color:var(--accent); border:1px solid var(--line); }
    select, input { border:1px solid var(--line); border-radius:6px; padding:6px 8px; font-size:13px; background:#fff; }
    .status { font-size:12px; color:var(--muted); }
    .pill { font-size:11px; padding:2px 8px; border-radius:999px; background:#e2e8f0; color:#334155; }
    .pill.live { background:#dcfce7; color:#166534; }
    .hidden { display:none !important; }

    /* Auth */
    #auth { max-width:360px; margin:8vh auto; background:var(--panel); border:1px solid var(--line);
            border-radius:12px; padding:24px; box-shadow:0 8px 30px rgba(0,0,0,.06); }
    #auth h2 { margin:0 0 4px; } #auth p { margin:0 0 18px; color:var(--muted); font-size:13px; }
    #auth label { display:block; font-size:12px; margin:10px 0 4px; color:var(--muted); }
    #auth input { width:100%; } #auth button { width:100%; margin-top:16px; padding:9px; }
    .err { color:#b91c1c; font-size:12px; margin-top:10px; min-height:16px; }

    /* Layout */
    #app { display:flex; min-height:100vh; }
    aside { width:210px; background:var(--sidebar); color:#cbd5e1; flex-shrink:0; padding:10px 0; }
    aside .brand { color:#fff; font-weight:600; padding:10px 16px 14px; font-size:15px; }
    aside button.nav { display:block; width:100%; text-align:left; background:transparent; color:#cbd5e1;
            border:0; border-radius:0; padding:8px 16px; font-size:13px; }
    aside button.nav:hover { background:#1e293b; color:#fff; }
    aside button.nav.active { background:var(--accent); color:#fff; }
    aside .navsep { border-top:1px solid #1e293b; margin:8px 0; }
    main { flex:1; min-width:0; display:flex; flex-direction:column; }
    header { background:var(--panel); border-bottom:1px solid var(--line); padding:10px 16px;
             display:flex; align-items:center; gap:10px; flex-wrap:wrap; position:sticky; top:0; z-index:5; }
    header h1 { font-size:15px; margin:0; margin-right:auto; }
    .wrap { padding:16px; overflow:auto; }

    /* Table */
    .tablebox { overflow-x:auto; background:var(--panel); border:1px solid var(--line); border-radius:10px; }
    table { border-collapse:collapse; width:100%; }
    th, td { border:1px solid var(--line); padding:0; text-align:center; white-space:nowrap; }
    th { background:#eef2f7; font-size:11px; font-weight:600; padding:6px 8px; position:sticky; top:0; }
    td .txtcell { padding:8px; }
    td input.num { width:64px; }
    td input.txt { width:150px; } td input.txt.wide { width:230px; }
    td input.date { width:130px; }
    td input { border:0; padding:8px 4px; text-align:center; background:transparent; }
    td input:focus { outline:2px solid var(--accent); outline-offset:-2px; background:#fff; }
    td input.dirty { background:#fef9c3; }
    tr:nth-child(even) td { background:#fafbfe; }
    button.del { background:transparent; color:#b91c1c; border:0; font-weight:700; padding:6px 10px; }
    button.del:hover { background:#fee2e2; }

    .toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:#111827;
             color:#fff; padding:8px 16px; border-radius:8px; font-size:13px; opacity:0; transition:.2s; z-index:20; }
    .toast.show { opacity:.95; }
  </style>
</head>
<body>
  <!-- Autentificare -->
  <div id="auth">
    <h2>Registru Digital</h2>
    <p>Autentificare bibliotecar</p>
    <label>Email</label>
    <input id="email" type="email" autocomplete="username" />
    <label>Parolă</label>
    <input id="password" type="password" autocomplete="current-password" />
    <button id="loginBtn">Autentificare</button>
    <div class="err" id="authErr"></div>
  </div>

  <!-- Aplicația -->
  <div id="app" class="hidden">
    <aside>
      <div class="brand">📚 Registru Digital</div>
      <div id="nav"></div>
    </aside>
    <main>
      <header>
        <h1 id="title">—</h1>
        <label class="status" id="anWrap">An <select id="an"></select></label>
        <label class="status" id="lunaWrap">Luna <select id="luna"></select></label>
        <label class="status" id="catWrap">Categorie
          <select id="cat"><option value="copii">Copii</option><option value="adulti">Adulți</option></select>
        </label>
        <button id="addRow" class="ghost">+ Rând</button>
        <button id="exportBtn" class="ghost" title="Export Excel (vizualizarea curentă)">⬇ Excel</button>
        <button id="backup" class="ghost" title="Copie locală completă (Excel + SQLite)">⬇ Backup local</button>
        <span id="live" class="pill">offline</span>
        <span class="status" id="backupInfo"></span>
        <span class="status" id="who"></span>
        <button id="logout" class="ghost">Ieșire</button>
      </header>
      <div class="wrap"><div id="content"></div></div>
    </main>
  </div>

  <datalist id="staffList"></datalist>
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/sql-wasm.js"></script>
  <script src="./config.js"></script>
  <script src="./parts.js"></script>
  <script src="./backup.js"></script>
  <script src="./app.js"></script>
</body>
</html>
