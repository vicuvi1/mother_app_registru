name: web-ci
on:
  push:
    paths: ["app_mother/biblioteca-app/web/**"]
  pull_request:
    paths: ["app_mother/biblioteca-app/web/**"]
jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app_mother/biblioteca-app/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax-check all JS
        run: for f in *.js; do echo "check $f"; node --check "$f"; done
      - name: Run logic tests
        run: node logic.test.js
